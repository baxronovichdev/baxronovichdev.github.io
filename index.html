padding:0;

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{
background:rgba(255,255,255,0.08);
padding:40px;

h1{

}

p{
color:#ccc;

}

a{
display:block;
text-decoration:none;
color:white;
background:#2563eb;
padding:14px;
margin:12px 0;
border-radius:12px;
font-size:20px;

}

a:hover{
background:#38bdf8;
transform:scale(1.05);
}
  .profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #38bdf8;
    margin-bottom:20px;
